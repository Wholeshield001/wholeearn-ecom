<dialog x-ref="deleteImageModal" class="rounded-xl shadow-lg max-w-md w-full">
  <div class="bg-white rounded-xl p-6 space-y-5">
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-lg font-semibold text-gray-900">Delete Image</h2>
        <p class="text-sm text-gray-600 mt-1">This action cannot be undone.</p>
      </div>
      <button type="button" @click="$refs.deleteImageModal.close()" class="text-gray-400 hover:text-gray-600">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="rounded-lg border border-gray-200 bg-gray-50 p-3">
      <p class="text-xs text-gray-500 mb-2">Image preview</p>
      <div class="aspect-video bg-white rounded-md overflow-hidden flex items-center justify-center">
        <img data-delete-preview src="" alt="Selected image" class="w-full h-full object-cover">
      </div>
    </div>

    <div class="flex gap-3">
      <button type="button" @click="$refs.deleteImageModal.close()" class="flex-1 px-4 py-2 bg-gray-200 text-gray-900 rounded-lg font-medium hover:bg-gray-300">
        Cancel
      </button>
      <button type="button" onclick="confirmDeleteImage()" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700">
        Delete Image
      </button>
    </div>
  </div>
</dialog>
