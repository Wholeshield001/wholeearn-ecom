<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; color: #111;">
    <h2 style="color:#ec3183;">Reset your password</h2>
    <p>Hello {{ user.first_name|default:user.email }},</p>
    <p>We received a request to reset your WholeShield password.</p>
    <p style="font-size:18px; font-weight:bold;">Your verification code: {{ otp }}</p>
    <p>This code expires in 10 minutes.</p>
    <p>If you did not request this, you can safely ignore this email.</p>
    <p>Thanks,<br/>The {{ site_name }} team</p>
  </body>
</html>
