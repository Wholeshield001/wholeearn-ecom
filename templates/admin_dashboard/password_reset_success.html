{% extends "admin_dashboard/login_base.html" %}
{% load static %}

{% block title %}Password Reset Successful{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
  <div class="flex justify-center mb-6">
    <img src="{% static 'images/wholeshield-logo.svg' %}" alt="Logo" class="h-10" />
  </div>

  <!-- Success Icon -->
  <div class="flex justify-center mb-6">
    <div class="w-20 h-20 bg-teal-100 rounded-full flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-teal-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
  </div>

  <h1 class="text-2xl font-semibold text-center mb-2">Congratulations!</h1>
  <p class="text-sm text-gray-600 text-center mb-8">Your new password has been created</p>

  <a
    href="{% url 'admin_login' %}"
    class="block w-full text-center rounded-lg bg-teal-500 text-white py-3 font-medium hover:bg-teal-600 transition-colors"
  >
    Continue
  </a>
</div>

<script>
  // Auto redirect after 3 seconds
  setTimeout(() => {
    window.location.href = "{% url 'admin_login' %}";
  }, 3000);
</script>
{% endblock %}
