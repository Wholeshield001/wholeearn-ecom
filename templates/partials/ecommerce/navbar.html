{% load static %}
<nav class="max-w-7xl mx-auto px-4">
  <div class="h-12 md:h-14 flex items-center justify-between">
    <button id="menuBtn" class="text-[#ec3183] font-medium">Menu</button>

    <a href="{% url 'home' %}" class="inline-flex">
      <img src="{% static 'images/wholeShield.png' %}" alt="WHOLESHIELD" class="h-6 md:h-8">
    </a>

    <div class="flex items-center gap-4">
      {% if user.is_authenticated %}
      <a href="{% url 'user-dashboard' %}" class="hidden sm:inline-flex" aria-label="My Dashboard">
        <span
          class="inline-block w-8 h-8 rounded-full bg-gradient-to-br from-[#31dec4] to-[#5aa8ff] ring-2 ring-blue-200"></span>
      </a>
      {% else %}
      <a href="{% url 'login' %}" class="hidden sm:inline-flex" aria-label="Login">
        <span
          class="inline-block w-8 h-8 rounded-full bg-gradient-to-br from-[#31dec4] to-[#5aa8ff] ring-2 ring-blue-200"></span>
      </a>
      {% endif %}
      <!-- Cart Icon with Badge -->
      <button id="openCartBtn" class="relative p-1.5 rounded-lg hover:bg-gray-100 transition-colors"
        aria-label="Shopping cart">
        <span class="material-symbols-outlined text-[#ec3183]">shopping_bag</span>
        <span id="cartItemCountBadge"
          class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-gradient-to-r from-[#ec3183] to-[#31dec4] rounded-full {% if not cart_item_count %}hidden{% endif %}">
          {{ cart_item_count|default:0 }}
        </span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div id="menuDrawer" class="hidden fixed inset-0 z-50">
    <!-- Backdrop -->
    <div id="menuBackdrop" class="absolute inset-0 bg-black/50 opacity-0 transition-opacity duration-200"></div>

    <!-- Drawer Container - using translate instead of absolute positioning -->
    <div id="drawerContainer"
      class="fixed top-0 left-0 h-screen w-80 max-w-[85vw] bg-white shadow-2xl transition-transform duration-300 -translate-x-full overflow-y-auto flex flex-col">
      <!-- Close Button -->
      <div class="flex justify-end items-center p-6 pb-4 border-b border-gray-200 flex-shrink-0">
        <button id="closeMenuBtn" class="p-2 rounded-lg hover:bg-gray-50 transition-colors">
          <span class="material-symbols-outlined text-[#ec3183] text-3xl">close</span>
        </button>
      </div>

      <!-- Menu Items -->
      <nav class="px-6 py-4 space-y-0 flex-1">
        <a href="{% url 'products' %}"
          class="block text-[#ec3183] text-3xl font-bold py-4 border-b border-gray-200 hover:opacity-80 transition-opacity">Shop
          All</a>
        <a href="{% url 'products' %}?gender=men"
          class="block text-[#ec3183] text-3xl font-bold py-4 border-b border-gray-200 hover:opacity-80 transition-opacity">Shop
          for Men</a>
        <a href="{% url 'products' %}?gender=women"
          class="block text-[#ec3183] text-3xl font-bold py-4 border-b border-gray-200 hover:opacity-80 transition-opacity">Shop
          for Women</a>
        <a href="{% url 'blog' %}"
          class="block text-[#ec3183] text-3xl font-bold py-4 hover:opacity-80 transition-opacity">Our Blog</a>
      </nav>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const menuBtn = document.getElementById('menuBtn');
      const menuDrawer = document.getElementById('menuDrawer');
      const menuBackdrop = document.getElementById('menuBackdrop');
      const closeMenuBtn = document.getElementById('closeMenuBtn');
      const drawerContainer = document.getElementById('drawerContainer');

      function openMenu() {
        menuDrawer.classList.remove('hidden');
        setTimeout(() => {
          menuBackdrop.classList.remove('opacity-0');
          drawerContainer.classList.remove('-translate-x-full');
        }, 10);
        document.body.style.overflow = 'hidden';
      }

      function closeMenu() {
        menuBackdrop.classList.add('opacity-0');
        drawerContainer.classList.add('-translate-x-full');
        setTimeout(() => {
          menuDrawer.classList.add('hidden');
        }, 300);
        document.body.style.overflow = '';
      }

      menuBtn.addEventListener('click', openMenu);
      closeMenuBtn.addEventListener('click', closeMenu);
      menuBackdrop.addEventListener('click', closeMenu);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !menuDrawer.classList.contains('hidden')) {
          closeMenu();
        }
      });
    });
  </script>
</nav>
