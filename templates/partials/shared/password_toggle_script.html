<script>
  (function () {
    function bindPasswordToggles(root) {
      const scope = root || document;
      const wrappers = scope.querySelectorAll('[data-password-wrap]');

      wrappers.forEach((wrap) => {
        const toggle = wrap.querySelector('[data-password-toggle]');
        const input = wrap.querySelector('input[type="password"], input[type="text"]');
        if (!toggle || !input || toggle.dataset.passwordToggleBound === 'true') {
          return;
        }

        const showIcon = toggle.querySelector('.icon-show');
        const hideIcon = toggle.querySelector('.icon-hide');
        toggle.dataset.passwordToggleBound = 'true';

        toggle.addEventListener('click', () => {
          const wasVisible = input.type === 'text';
          const isVisible = !wasVisible;
          input.type = isVisible ? 'text' : 'password';
          toggle.setAttribute('data-visible', String(isVisible));

          const labelBase = toggle.getAttribute('data-password-label') || 'password';
          toggle.setAttribute('aria-label', isVisible ? `Hide ${labelBase}` : `Show ${labelBase}`);

          if (showIcon && hideIcon) {
            showIcon.classList.toggle('hidden', isVisible);
            hideIcon.classList.toggle('hidden', !isVisible);
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => bindPasswordToggles(document));
    document.body.addEventListener('htmx:afterSwap', (event) => bindPasswordToggles(event.target));
  })();
</script>
